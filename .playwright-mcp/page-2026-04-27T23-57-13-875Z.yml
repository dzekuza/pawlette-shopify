            - button "Ar PawCharms antkakliai yra atsparūs vandeniui? +" [ref=e36] [cursor=pointer]:
              - generic [ref=e37]: Ar PawCharms antkakliai yra atsparūs vandeniui?
              - generic [ref=e38]: +
            - paragraph [ref=e39]: Taip. Visi PawCharms antkakliai pagaminti iš maistinio silikono, todėl puikiai tinka maudynėms, lietui ir purviniems pasivaikščiojimams. Medžiaga nesugeria kvapų ar dėmių.
          - generic [ref=e40]:
            - button "Kaip veikia keičiami pakabukai? +" [ref=e41] [cursor=pointer]:
              - generic [ref=e42]: Kaip veikia keičiami pakabukai?
              - generic [ref=e43]: +
            - paragraph [ref=e44]: Kiekvienas pakabukas turi prisegamą jungtį, kuri užsisega ir nusiima maždaug per 5 sekundes. Jokų įrankių ir jokio vargo. Galite laisvai derinti visus 12 dizainų prie bet kurio PawCharms antkaklio.
          - generic [ref=e45]:
            - button "Kaip pasirinkti tinkamą antkaklio dydį? +" [ref=e46] [cursor=pointer]:
              - generic [ref=e47]: Kaip pasirinkti tinkamą antkaklio dydį?
              - generic [ref=e48]: +
            - paragraph [ref=e49]: Išmatuokite plačiausią šuns kaklo vietą ir patogumui pridėkite 2–3 cm. XS tinka 20–28 cm, S tinka 28–36 cm, M tinka 36–44 cm, o L tinka 44–54 cm. Jei šuo tarp dydžių, rinkitės didesnį.
          - generic [ref=e50]:
            - button "Ar galiu išgraviruoti savo šuns vardą ant antkaklio? +" [ref=e51] [cursor=pointer]:
              - generic [ref=e52]: Ar galiu išgraviruoti savo šuns vardą ant antkaklio?
              - generic [ref=e53]: +
            - paragraph [ref=e54]: Taip — personalizuotas graviravimas galimas atsiskaitymo metu. Galite pridėti vardą, trumpą žinutę arba telefono numerį saugumui. Graviravimas lazeriu atliekamas tiesiai silikone.
          - generic [ref=e55]:
            - button "Kur gaminami PawCharms antkakliai? +" [ref=e56] [cursor=pointer]:
              - generic [ref=e57]: Kur gaminami PawCharms antkakliai?
              - generic [ref=e58]: +
            - paragraph [ref=e59]: Kiekvienas antkaklis kuriamas ir gaminamas rankomis Vilniuje, Lietuvoje. Esame maža komanda, todėl kiekvienas užsakymas ruošiamas kruopščiai.
          - generic [ref=e60]:
            - button "Kiek patvari silikoninė medžiaga? +" [ref=e61] [cursor=pointer]:
              - generic [ref=e62]: Kiek patvari silikoninė medžiaga?
              - generic [ref=e63]: +
            - paragraph [ref=e64]: PawCharms antkakliai sukurti ilgam. Maistinis silikonas atsparus UV spinduliams, sūriam vandeniui, chlorui ir kasdieniam nešiojimui. Jis netrūkinėja ir nenusibraukia taip greitai kaip įprastos medžiagos.
          - generic [ref=e65]:
            - button "Ar pakabukai tinka visiems antkaklių dydžiams? +" [ref=e66] [cursor=pointer]:
              - generic [ref=e67]: Ar pakabukai tinka visiems antkaklių dydžiams?
              - generic [ref=e68]: +
