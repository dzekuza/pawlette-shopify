      - generic [ref=e395]:
        - generic [ref=e396]:
          - button "Are PawCharms collars waterproof? +" [ref=e397] [cursor=pointer]:
            - generic [ref=e398]: Are PawCharms collars waterproof?
            - generic [ref=e399]: +
          - paragraph [ref=e400]: Yes. All Žavesys collars are made from food-grade silicone — fully waterproof and safe for swimming, rain, and muddy walks. The material does not absorb odours or stains.
        - generic [ref=e401]:
          - button "How do the swap charms work? +" [ref=e402] [cursor=pointer]:
            - generic [ref=e403]: How do the swap charms work?
            - generic [ref=e404]: +
          - paragraph [ref=e405]: Each charm uses a snap connector that clicks on and off in around 5 seconds — no tools, no fiddling. You can mix and match all 12 charm designs freely between collars.
        - generic [ref=e406]:
          - button "How do I choose the right collar size? +" [ref=e407] [cursor=pointer]:
            - generic [ref=e408]: How do I choose the right collar size?
            - generic [ref=e409]: +
          - paragraph [ref=e410]: Measure around the widest part of your dog's neck and add 2–3 cm for comfort. XS fits 20–28 cm, S fits 28–36 cm, M fits 36–44 cm, and L fits 44–54 cm.
        - generic [ref=e411]:
          - button "Can I engrave my dog's name on the collar? +" [ref=e412] [cursor=pointer]:
            - generic [ref=e413]: Can I engrave my dog's name on the collar?
            - generic [ref=e414]: +
          - paragraph [ref=e415]: Yes — personalised engraving is available at checkout. You can add your dog's name, a short message, or a phone number for safety.
        - generic [ref=e416]:
          - button "Where are PawCharms collars made? +" [ref=e417] [cursor=pointer]:
            - generic [ref=e418]: Where are PawCharms collars made?
            - generic [ref=e419]: +
