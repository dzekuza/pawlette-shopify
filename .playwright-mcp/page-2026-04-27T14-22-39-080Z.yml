        - generic [ref=e400]:
          - button "Are PawCharms collars waterproof? +" [ref=e401] [cursor=pointer]:
            - generic [ref=e402]: Are PawCharms collars waterproof?
            - generic [ref=e403]: +
          - paragraph [ref=e404]: Yes. All Žavesys collars are made from food-grade silicone — fully waterproof and safe for swimming, rain, and muddy walks. The material does not absorb odours or stains.
        - generic [ref=e405]:
          - button "How do the swap charms work? +" [ref=e406] [cursor=pointer]:
            - generic [ref=e407]: How do the swap charms work?
            - generic [ref=e408]: +
          - paragraph [ref=e409]: Each charm uses a snap connector that clicks on and off in around 5 seconds — no tools, no fiddling. You can mix and match all 12 charm designs freely between collars.
        - generic [ref=e410]:
          - button "How do I choose the right collar size? +" [ref=e411] [cursor=pointer]:
            - generic [ref=e412]: How do I choose the right collar size?
            - generic [ref=e413]: +
          - paragraph [ref=e414]: Measure around the widest part of your dog's neck and add 2–3 cm for comfort. XS fits 20–28 cm, S fits 28–36 cm, M fits 36–44 cm, and L fits 44–54 cm.
        - generic [ref=e415]:
          - button "Can I engrave my dog's name on the collar? +" [ref=e416] [cursor=pointer]:
            - generic [ref=e417]: Can I engrave my dog's name on the collar?
            - generic [ref=e418]: +
          - paragraph [ref=e419]: Yes — personalised engraving is available at checkout. You can add your dog's name, a short message, or a phone number for safety.
        - generic [ref=e420]:
          - button "Where are PawCharms collars made? +" [ref=e421] [cursor=pointer]:
            - generic [ref=e422]: Where are PawCharms collars made?
            - generic [ref=e423]: +
